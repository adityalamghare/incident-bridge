services:
  - type: web
    name: incident-bridge
    runtime: node
    plan: starter          # always-on (not serverless)
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SKILLHUB_HEALTH_URL
        sync: false
      - key: FH_HEARTBEAT_URL
        sync: false
      - key: FH_WEBHOOK_SIGNING_KEY
        sync: false
      - key: FH_COMMAND_SIGNING_SECRET
        sync: false
      - key: VERCEL_TOKEN
        sync: false
      - key: VERCEL_PROJECT_ID
        sync: false
      - key: VERCEL_TEAM_ID
        sync: false
      - key: GOOD_DEPLOYMENT_ID
        sync: false
